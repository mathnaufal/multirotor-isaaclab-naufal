seed: 42

# skrl model instantiator parameters
models:
  separate: true
  CTDE: true
  separate_actors: true
  separate_critics: false
  local_critics: false
  policy:
    class: GaussianMixin
    clip_actions: false
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: false
    network:
      - name: net
        input: STATES
        layers: [256, 128, 64]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: MAPPO
  separate_actors: true
  use_state_space: true
  rollouts: 128
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate_actor: 5.0e-4
  learning_rate_critic: 1.0e-4
  learning_rate_scheduler_actor: null
  learning_rate_scheduler_actor_kwargs: null
  learning_rate_scheduler_critic: null
  learning_rate_scheduler_critic_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  shared_state_preprocessor: RunningStandardScaler
  shared_state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.15
  value_clip: 0.1
  clip_predicted_values: true
  entropy_loss_scale: 0.001
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: true
  experiment:
    directory: "mappo_flyrod_track_position"
    experiment_name: "direct_marl"
    write_interval: 100
    checkpoint_interval: 5000

trainer:
  class: SequentialTrainer
  timesteps: 3000000
  environment_info: log
